    <!-- ═════════════════════════════════════════════════════════════════════
         Host-aware PWA manifest swap (patient vs clinic).
         بيشتغل قبل ما React يتحمّل — عشان لمّا المستخدم يضيف التطبيق للشاشه،
         الاسم والأيقونه والـthemeColor بتبقى صحيحه حسب الدومين.
           - drhypermed.com / www.drhypermed.com → "DrHyperPublic" (teal)  // تطبيق الجمهور/العيانين
           - clinic.drhypermed.com              → "DrHyperMed"    (blue)  // تطبيق الطبيب
           - localhost / staging                 → بيستنتج الـflavor من الـpathname:
             * /public, /login/public, /book-public/* → DrHyperPublic
             * كل ما عدا ذلك                          → DrHyperMed
             * override يدوي: ?hostMode=patient|clinic أو localStorage __hostMode_override
         ═══════════════════════════════════════════════════════════════════════ -->
    <script>
        (function () {
            try {
                var host = (window.location.hostname || '').toLowerCase();
                var pathname = (window.location.pathname || '/').toLowerCase();
                var isClinic = host === 'clinic.drhypermed.com';
                var isPatient = host === 'drhypermed.com' || host === 'www.drhypermed.com';

                // ── dev/localhost: نستنتج الـflavor من الـpathname والـoverride ──
                // ده عشان dev يبقى consistent مع اللي بيظهر للمستخدم بدل ما الـtitle
                // يفضّل "للجمهور" بينما الواجهة المعروضة "للطبيب" أو العكس.
                if (!isClinic && !isPatient) {
                    var override = null;
                    try {
                        var params = new URLSearchParams(window.location.search || '');
                        var fromUrl = params.get('hostMode');
                        if (fromUrl === 'patient' || fromUrl === 'clinic') override = fromUrl;
                        if (!override) {
                            var fromStorage = window.localStorage.getItem('__hostMode_override');
                            if (fromStorage === 'patient' || fromStorage === 'clinic') override = fromStorage;
                        }
                    } catch (_) { /* تجاهل: storage ممكن يكون مقفول */ }

                    // المسارات اللي بتخدم الجمهور بس
                    var isPublicPath = (
                        pathname === '/public' ||
                        pathname === '/login/public' ||
                        pathname.indexOf('/book-public/') === 0
                    );

                    if (override === 'patient' || (override == null && isPublicPath)) {
                        isPatient = true;
                    } else {
                        // الافتراضي في dev: clinic (الـlanding للأطباء بتطلع على /)
                        isClinic = true;
                    }
                }

                // نعرّض العلم على window قبل أي return عشان سكريبت الـsplash
                // يعرف يبدّل الكلام تحت اللوجو (جمهور ولّا أطباء) من غير ما ينتظر React.
                window.__dhIsPatient = isPatient;
                window.__dhIsClinic = isClinic;

                var manifestUrl = isClinic ? '/manifest-clinic.webmanifest' : '/manifest-patient.webmanifest';
                // الأسماء اللي بتبان على أيقونة التطبيق بعد التثبيت — مفصوله تماماً بين التطبيقين
                var appTitle = isClinic ? 'DrHyperMed' : 'DrHyperPublic';
                var themeColor = isClinic ? '#2563eb' : '#0d9488';

                // ═══════════════════════════════════════════════════════════════
                // تبديل الـSEO meta للدومين الجمهور (الـdefaults في HTML موجّهه للعيادة).
                // بيشتغل قبل ما JS modules تتحمّل، فـGooglebot بيقرا الصح من أول render.
                // ⚠️ ملاحظة: واتساب/فيسبوك بيقرا الـHTML الثابت فقط (مش بينفّذ JS)،
                //   فالـpreview للدومين drhypermed.com هيظهر defaults العيادة. ده مقبول
                //   لأن المشاركات الأكثر = روابط dr/:slug (لها meta منفصلة في فنكشن SSR).
                // ═══════════════════════════════════════════════════════════════
                if (isPatient) {
                    var patientUrl = 'https://www.drhypermed.com/';
                    var patientTitle = 'دكتور هايبر — احجز دكتور أون لاين في مصر';
                    var patientDesc = 'دكتور هايبر — دوّر على دكتور قريب منّك في مصر، شوف مواعيد العيادة وتقييمات المرضى، واحجز ميعادك من الموبايل بدون اتصالات. حجزك كـمريض مجاني.';
                    var patientImg = 'https://www.drhypermed.com/pwa-512x512.png';

                    document.title = patientTitle;

                    var descMeta = document.querySelector('meta[name="description"]');
                    if (descMeta) descMeta.setAttribute('content', patientDesc);

                    var canonicalEl = document.getElementById('dh-canonical');
                    if (canonicalEl) canonicalEl.setAttribute('href', patientUrl);

                    var ogUrl = document.querySelector('meta[property="og:url"]');
                    if (ogUrl) ogUrl.setAttribute('content', patientUrl);
                    var ogTitle = document.querySelector('meta[property="og:title"]');
                    if (ogTitle) ogTitle.setAttribute('content', patientTitle);
                    var ogDesc = document.querySelector('meta[property="og:description"]');
                    if (ogDesc) ogDesc.setAttribute('content', patientDesc);
                    var ogImg = document.querySelector('meta[property="og:image"]');
                    if (ogImg) ogImg.setAttribute('content', patientImg);
                    var ogSite = document.querySelector('meta[property="og:site_name"]');
                    if (ogSite) ogSite.setAttribute('content', 'Dr Hyper');

                    var twTitle = document.querySelector('meta[name="twitter:title"]');
                    if (twTitle) twTitle.setAttribute('content', patientTitle);
                    var twDesc = document.querySelector('meta[name="twitter:description"]');
                    if (twDesc) twDesc.setAttribute('content', patientDesc);
                    var twImg = document.querySelector('meta[name="twitter:image"]');
                    if (twImg) twImg.setAttribute('content', patientImg);

                    // JSON-LD: WebSite للجمهور بدل الـSoftwareApplication الافتراضي للعيادة
                    var jsonld = document.getElementById('dh-jsonld');
                    if (jsonld) {
                        jsonld.textContent = JSON.stringify({
                            '@context': 'https://schema.org',
                            '@type': 'WebSite',
                            'name': 'دكتور هايبر',
                            'alternateName': 'Dr Hyper',
                            'url': patientUrl,
                            'description': 'منصّه حجز مواعيد الأطباء في مصر — دليل أطباء، مواعيد العيادات، تقييمات المرضى، وحجز أون لاين من الموبايل.',
                            'inLanguage': 'ar',
                            'potentialAction': {
                                '@type': 'SearchAction',
                                'target': 'https://www.drhypermed.com/public?q={search_term_string}',
                                'query-input': 'required name=search_term_string'
                            }
                        });
                    }
                }

                // iOS Safari بيستخدم الـapple-mobile-web-app-title للاسم لمّا تضيف التطبيق
                var appleTitle = document.querySelector('meta[name="apple-mobile-web-app-title"]');
                if (appleTitle) appleTitle.setAttribute('content', appTitle);

                // الـtheme-color بيطلع في الشريط العلوي للبراوزر + لون الـsplash لما التطبيق يتثبت
                var themeMeta = document.querySelector('meta[name="theme-color"]');
                if (themeMeta) themeMeta.setAttribute('content', themeColor);

                // نشيل أي manifest link اتحقن من الـbuild ونضيف اللي يناسب الدومين.
                // بيتنفّذ مرتين — مره دلوقتي ومره بعد DOMContentLoaded عشان لو vite-plugin-pwa
                // حقن الـlink بتاعه بعد الـscript ده.
                function swapManifest() {
                    var existing = document.querySelectorAll('link[rel="manifest"]');
                    for (var i = 0; i < existing.length; i++) { existing[i].parentNode.removeChild(existing[i]); }
                    var link = document.createElement('link');
                    link.rel = 'manifest';
                    link.href = manifestUrl;
                    document.head.appendChild(link);
                }
                swapManifest();
                if (document.readyState === 'loading') {
                    document.addEventListener('DOMContentLoaded', swapManifest, { once: true });
                }
            } catch (e) { /* تجاهل — لو فشل السكريبت، هيستعمل الـmanifest الافتراضي */ }
        })();
    </script>

    <script>
        // Performance timing — يظهر في console للتشخيص
        window.__dhSplashT0 = performance.now();
        console.log('[DH-TIMING] splash-visible: 0ms');

        (function () {
            var splash = document.getElementById('dh-splash');
            if (!splash) return;
            var hidden = false;

            function hide(reason) {
                if (hidden) return;
                hidden = true;
                var elapsed = Math.round(performance.now() - window.__dhSplashT0);
                console.log('[DH-TIMING] splash-hidden (' + reason + '): ' + elapsed + 'ms');
                splash.classList.add('dh-splash--hidden');
                setTimeout(function () {
                    if (splash && splash.parentNode) splash.parentNode.removeChild(splash);
                }, 100);
            }

            // ========= Expose hide to App mount =========
            // الصفحة الحقيقية (MainApp/LandingPage/...) هتستدعي window.__dhHideSplash()
            // لما تعمل mount فعلاً — كده المستخدم ميشوفش شاشة بيضاء وسطانية.
            window.__dhHideSplash = function (reason) { hide(reason || 'page-ready'); };

            // ========= بدّل العنوان الفرعي للجمهور =========
            // الافتراضي في الـHTML كلام للأطباء ("نظام إدارة العيادات الذكية").
            // لو الدومين جمهور (drhypermed.com) نبدّله بكلام مناسب للمريض.
            var isPatientView = !!window.__dhIsPatient;
            if (isPatientView) {
                var subtitleEl = document.getElementById('dh-splash-subtitle');
                if (subtitleEl) subtitleEl.textContent = 'احجز مع أفضل الأطباء في مكان واحد';
            }

            // ========= رسائل متغيرة تحت اللوجو =========
            // بدل ما المستخدم يستنى بدون أي feedback، نعرض رسائل متدرّجة بتوضّح
            // إن التطبيق بيحمّل. كل رسالة بتفضل 1.8 ثانية ثم تتبدّل بنعومة.
            // للجمهور رسائل عن البحث والحجز، للأطباء رسائل عن لوحة التحكم والصلاحيات.
            var statusEl = document.getElementById('dh-splash-status');
            if (statusEl) {
                var statusMessages = isPatientView ? [
                    'جارٍ تهيئة التطبيق',
                    'جارٍ تحميل دليل الأطباء',
                    'جارٍ تجهيز المواعيد المتاحة',
                    'جارٍ مزامنة آخر التحديثات',
                    'لحظات وتكتمل الجاهزية'
                ] : [
                    'جارٍ تهيئة النظام',
                    'جارٍ تحميل بياناتك الطبية',
                    'جارٍ تحضير لوحة التحكم',
                    'جارٍ التحقق من صلاحيات الحساب',
                    'جارٍ مزامنة آخر التحديثات',
                    'لحظات وتكتمل جاهزية النظام'
                ];
                var statusIdx = 0;
                var showStatus = function () {
                    statusEl.textContent = statusMessages[statusIdx];
                    statusEl.classList.add('dh-splash__status--visible');
                };
                // أوّل رسالة تظهر بعد 600ms (بعد ما اللوجو والعنوان يبانوا)
                setTimeout(showStatus, 600);
                // كل 1.8 ثانية نغيّر الرسالة بـ crossfade
                var statusTimer = setInterval(function () {
                    if (hidden) { clearInterval(statusTimer); return; }
                    statusEl.classList.remove('dh-splash__status--visible');
                    setTimeout(function () {
                        statusIdx = (statusIdx + 1) % statusMessages.length;
                        statusEl.textContent = statusMessages[statusIdx];
                        statusEl.classList.add('dh-splash__status--visible');
                    }, 300);
                }, 1800);
            }

            // ========= Safety net =========
            // 7 ثواني كحد أقصى — لو التحميل لأي سبب تأخر أكتر من كده بنخفي السبلاش
            // ونعرض الصفحة الحالية حتى لو لسه بتحمل.
            setTimeout(function () { hide('safety-timeout'); }, 7000);
        })();
    </script>
    <div id="root"></div>
    <script>
        (function () {
            var RECOVERY_FLAG = 'dh-module-recovery-ts';
            var RECOVERY_PARAM = 'reset_pwa';
            var RECOVERY_TS_PARAM = 'dh_recover_ts';
            var RECOVERY_COOLDOWN_MS = 2 * 60 * 1000;
            var recoveryFlagInMemory = false;
            var recoveryTimestampInMemory = 0;

            function getRecoveryTimestamp() {
                if (recoveryFlagInMemory && recoveryTimestampInMemory > 0) {
                    return recoveryTimestampInMemory;
                }
                try {
                    var raw = sessionStorage.getItem(RECOVERY_FLAG);
                    var parsed = Number(raw || 0);
                    if (!isFinite(parsed) || parsed <= 0) return 0;
                    return parsed;
                } catch (_) {
                    return recoveryTimestampInMemory;
                }
            }

            function hasRecoveryFlag() {
                var timestamp = getRecoveryTimestamp();
                if (timestamp <= 0) return false;
                return Date.now() - timestamp < RECOVERY_COOLDOWN_MS;
            }

            function setRecoveryFlag() {
                recoveryFlagInMemory = true;
                recoveryTimestampInMemory = Date.now();
                try {
                    sessionStorage.setItem(RECOVERY_FLAG, String(recoveryTimestampInMemory));
                } catch (_) { }
            }

            function clearRecoveryFlag() {
                recoveryFlagInMemory = false;
                recoveryTimestampInMemory = 0;
                try {
                    sessionStorage.removeItem(RECOVERY_FLAG);
                } catch (_) { }
            }

            function removeRecoveryParamsFromUrl() {
                try {
                    var current = new URL(window.location.href);
                    if (!current.searchParams.has(RECOVERY_PARAM) && !current.searchParams.has(RECOVERY_TS_PARAM)) {
                        return;
                    }
                    current.searchParams.delete(RECOVERY_PARAM);
                    current.searchParams.delete(RECOVERY_TS_PARAM);
                    window.history.replaceState({}, '', current.toString());
                } catch (_) { }
            }

            function safeReload() {
                window.location.reload();
            }

            function clearCachesAndReload() {
                if (!('caches' in window)) {
                    safeReload();
                    return;
                }

                caches.keys()
                    .then(function (keys) {
                        return Promise.all(keys.map(function (key) {
                            return caches.delete(key);
                        }));
                    })
                    .catch(function () { })
                    .finally(safeReload);
            }

            function unregisterSwAndReload() {
                if (!('serviceWorker' in navigator)) {
                    clearCachesAndReload();
                    return;
                }

                navigator.serviceWorker.getRegistrations()
                    .then(function (registrations) {
                        return Promise.all(registrations.map(function (registration) {
                            return registration.unregister();
                        }));
                    })
                    .catch(function () { })
                    .finally(clearCachesAndReload);
            }

            function tryRecover() {
                if (hasRecoveryFlag()) return;
                setRecoveryFlag();
                unregisterSwAndReload();
            }

            function hasResetParam() {
                try {
                    var params = new URLSearchParams(window.location.search || '');
                    return params.get(RECOVERY_PARAM) === '1';
                } catch (_) {
                    return false;
                }
            }

            function shouldRecoverFromRuntimeError(errorLike) {
                var msg = '';
                try {
                    msg = String((errorLike && errorLike.message) || errorLike || '').toLowerCase();
                } catch (_) {
                    msg = '';
                }
                if (!msg) return false;
                return (
                    msg.indexOf('isauthenticated is not defined') !== -1 ||
                    msg.indexOf('chunkloaderror') !== -1 ||
                    msg.indexOf('failed to fetch dynamically imported module') !== -1 ||
                    msg.indexOf('unsupported mime type') !== -1 ||
                    msg.indexOf("mime type ('text/html')") !== -1 ||
                    msg.indexOf('importscripts failed') !== -1
                );
            }

            if (hasResetParam()) {
                tryRecover();
                removeRecoveryParamsFromUrl();
            }

            window.addEventListener('error', function (event) {
                var target = event.target;
                if (!target || target.tagName !== 'SCRIPT') return;
                var src = String(target.src || '');
                var isSwRelatedScript =
                    src.indexOf('/sw.js') !== -1 ||
                    src.indexOf('/firebase-messaging-sw.js') !== -1 ||
                    src.indexOf('/workbox-') !== -1;
                if (target.type === 'module' || isSwRelatedScript) {
                    tryRecover();
                }
            }, true);

            window.addEventListener('error', function (event) {
                if (shouldRecoverFromRuntimeError(event && event.error)) {
                    tryRecover();
                }
            });

            window.addEventListener('unhandledrejection', function (event) {
                if (shouldRecoverFromRuntimeError(event && event.reason)) {
                    tryRecover();
                }
            });

            function isAppMounted() {
                var root = document.getElementById('root');
                return !!(root && root.childElementCount > 0);
            }

            function scheduleMountRecoveryWatchdog() {
                setTimeout(function () {
                    if (isAppMounted()) {
                        clearRecoveryFlag();
                        removeRecoveryParamsFromUrl();
                    }
                }, 4000);

                setTimeout(function () {
                    if (hasRecoveryFlag()) return;
                    if (document.visibilityState === 'hidden') return;
                    if (typeof navigator !== 'undefined' && navigator.onLine === false) return;
                    if (isAppMounted()) return;
                    // Grace window for slow iPhone devices before forcing recovery.
                    setTimeout(function () {
                        if (hasRecoveryFlag()) return;
                        if (document.visibilityState === 'hidden') return;
                        if (isAppMounted()) {
                            clearRecoveryFlag();
                            removeRecoveryParamsFromUrl();
                            return;
                        }
                        tryRecover();
                    }, 3000);
                }, 25000);
            }

            if (document.readyState === 'complete') {
                scheduleMountRecoveryWatchdog();
            } else {
                window.addEventListener('load', scheduleMountRecoveryWatchdog, { once: true });
            }
        })();
    </script>
