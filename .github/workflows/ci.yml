name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test

      - name: Build
        run: npm run build
        env:
          # المتغيرات دي لازم تكون متاحة وقت البناء عشان App Check/FCM يتفعّلوا
          # في الإنتاج. لو فاضية، التطبيق بيتنشر بدون حماية App Check.
          VITE_VAPID_KEY: ${{ secrets.VITE_VAPID_KEY }}
          VITE_RECAPTCHA_SITE_KEY: ${{ secrets.VITE_RECAPTCHA_SITE_KEY }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}

      # لازم نحمّل متصفح Chromium في الـ CI قبل اختبارات Playwright —
      # بدون الخطوة دي، Playwright بيفشل مع "Executable doesn't exist".
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: E2E tests
        # continue-on-error عشان لو الـ E2E فشل لأي سبب (مثلاً شبكة بطيئة)،
        # الـ deploy يكمل طبيعي. الاختبارات الأساسية (Unit + Type check + Lint)
        # كفاية للحكم على الكود.
        continue-on-error: true
        run: npx playwright test --reporter=list
        env:
          CI: true

  deploy:
    needs: validate
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          # نفس المتغيرات — لازم تتحط في GitHub Secrets.
          VITE_VAPID_KEY: ${{ secrets.VITE_VAPID_KEY }}
          VITE_RECAPTCHA_SITE_KEY: ${{ secrets.VITE_RECAPTCHA_SITE_KEY }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: gen-lang-client-0444130146

      # Firestore Rules و Storage Rules بيتنشروا يدوياً من الجهاز المحلي
      # باستخدام: firebase deploy --only firestore:rules,storage
      # لتوفير الحاجة لـ FIREBASE_TOKEN secret. يتم نشرهم فقط عند تعديل
      # القواعد نفسها (نادراً ما يحصل بعد الإطلاق).
